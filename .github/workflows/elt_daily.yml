name: ELT Pipeline — Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  NVD_API_KEY:               ${{ secrets.NVD_API_KEY }}
  DATABASE_URL:              ${{ secrets.DATABASE_URL }}
  R2_EXTRACTOR_KEY:          ${{ secrets.R2_EXTRACTOR_KEY }}
  R2_EXTRACTOR_SECRECT_KEY:  ${{ secrets.R2_EXTRACTOR_SECRECT_KEY }}
  R2_PL_URL:                 ${{ secrets.R2_PL_URL }}
  R2_BUCKET_NAME:            ${{ secrets.R2_BUCKET_NAME }}

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      # Report dependency CVEs but never block data collection on them.
      - run: pip-audit
        continue-on-error: true
      - run: python -m pipeline.run delta_poll daily